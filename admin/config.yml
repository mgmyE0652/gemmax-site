backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  # 1. Ürün Yönetimi (Yeni ürün ekleme, silme, görsel yükleme)
  - name: "urunler"
    label: "Ürünler"
    folder: "content/urunler"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Ürün Adı", name: "title", widget: "string"}
      - {label: "Ürün Görseli", name: "image", widget: "image"}
      - {label: "Kategori", name: "category", widget: "select", options: ["Manyetik Kilitler", "Geçiş Kontrol", "Güvenlik Sistemleri"]}
      - {label: "Ürün Açıklaması", name: "body", widget: "markdown"}

  # 2. Site Sayfaları Yönetimi (Ana Sayfa, Kurumsal, İletişim)
  - name: "sayfalar"
    label: "Site Sayfaları"
    files:
      - file: "index.html"
        label: "Ana Sayfa"
        name: "anasayfa"
        fields:
          - {label: "Sayfa Başlığı", name: "title", widget: "string"}
          - {label: "Ana Slogan / Metin", name: "body", widget: "markdown"}

      - file: "kurumsal.html"
        label: "Kurumsal"
        name: "kurumsal"
        fields:
          - {label: "Başlık", name: "title", widget: "string"}
          - {label: "Kurumsal İçerik", name: "body", widget: "markdown"}

      - file: "iletisim.html"
        label: "İletişim"
        name: "iletisim"
        fields:
          - {label: "Başlık", name: "title", widget: "string"}
          - {label: "İletişim Bilgileri", name: "body", widget: "markdown"}
