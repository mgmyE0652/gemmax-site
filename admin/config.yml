backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  # 1. Ürünler (Çoklu ürün ekleyip silebileceğiniz klasör yapısı)
  - name: "urunler"
    label: "Ürünler"
    folder: "content/urunler"
    create: true
    fields:
      - {label: "Ürün Adı", name: "title", widget: "string"}
      - {label: "Görsel", name: "image", widget: "image"}
      - {label: "Açıklama", name: "body", widget: "markdown"}

  # 2. Site Sayfaları (Ana Sayfa, Kurumsal, Çözüm Alanları, İletişim)
  - name: "sayfalar"
    label: "Site Sayfaları"
    files:
      - file: "index.html"
        label: "Ana Sayfa"
        name: "anasayfa"
        fields:
          - {label: "Sayfa Başlığı", name: "title", widget: "string"}
          - {label: "Ana İçerik / Yazı", name: "body", widget: "markdown"}

      - file: "kurumsal.html"
        label: "Kurumsal"
        name: "kurumsal"
        fields:
          - {label: "Başlık", name: "title", widget: "string"}
          - {label: "Kurumsal İçerik", name: "body", widget: "markdown"}

      - file: "cozum-alanlari.html"
        label: "Çözüm Alanları"
        name: "cozum_alanlari"
        fields:
          - {label: "Başlık", name: "title", widget: "string"}
          - {label: "İçerik", name: "body", widget: "markdown"}

      - file: "iletisim.html"
        label: "İletişim"
        name: "iletisim"
        fields:
          - {label: "Başlık", name: "title", widget: "string"}
          - {label: "İletişim Bilgileri / Metni", name: "body", widget: "markdown"}
