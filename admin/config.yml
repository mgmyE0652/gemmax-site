backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  # 1. Gelişmiş Ürün Yönetimi (Kategorili, Fiyatlı ve Çoklu Görsel Destekli)
  - name: "urunler"
    label: "📦 Ürünler Kataloğu"
    folder: "content/urunler"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Ürün Adı", name: "title", widget: "string"}
      - {label: "Kategori", name: "category", widget: "select", options: ["Manyetik Kilitler", "Geçiş Kontrol Sistemleri", "Güvenlik Donanımları"]}
      - {label: "Ana Ürün Görseli", name: "image", widget: "image"}
      - {label: "Ürün Özellikleri / Açıklama", name: "body", widget: "markdown"}

  # 2. Esnek Sayfa ve Tasarım Yönetimi (Blok Blok Düzenleme)
  - name: "sayfalar"
    label: "🎨 Sayfa ve Tasarım Blokları"
    files:
      - file: "index.html"
        label: "Ana Sayfa Tasarımı"
        name: "anasayfa"
        fields:
          - {label: "Sayfa Sekme Başlığı", name: "title", widget: "string"}
          - label: "Sayfa Blokları"
            name: "blocks"
            widget: "list"
            fields:
              - {label: "Blok Başlığı", name: "heading", widget: "string"}
              - {label: "Blok İçeriği / Metin", name: "text", widget: "markdown"}
              - {label: "Blok Görseli", name: "block_image", widget: "image", required: false}

      - file: "kurumsal.html"
        label: "Kurumsal Sayfa"
        name: "kurumsal"
        fields:
          - {label: "Sayfa Başlığı", name: "title", widget: "string"}
          - {label: "Kurumsal Metin", name: "body", widget: "markdown"}

      - file: "iletisim.html"
        label: "İletişim Sayfası"
        name: "iletisim"
        fields:
          - {label: "Sayfa Başlığı", name: "title", widget: "string"}
          - {label: "İletişim Bilgileri", name: "body", widget: "markdown"}
