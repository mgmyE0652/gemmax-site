backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  # 1. Ürünler Bölümü (Sınırsız ürün ekleyip düzenleyebileceğiniz alan)
  - name: "urunler"
    label: "Ürünler"
    folder: "content/urunler"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Ürün Adı", name: "title", widget: "string"}
      - {label: "Ürün Görseli", name: "image", widget: "image"}
      - {label: "Açıklama", name: "body", widget: "markdown"}

  # 2. Site Sayfaları (Ana Sayfa, Kurumsal, İletişim vb.)
  - name: "sayfalar"
    label: "Site Sayfaları"
    files:
      - file: "index.html"
        label: "Ana Sayfa"
        name: "anasayfa"
        fields:
          - {label: "Sayfa Başlığı", name: "title", widget: "string"}
          - {label: "İçerik", name: "body", widget: "markdown"}

      - file: "kurumsal.html"
        label: "Kurumsal"
        name: "kurumsal"
        fields:
          - {label: "Başlık", name: "title", widget: "string"}
          - {label: "İçerik", name: "body", widget: "markdown"}

      - file: "iletisim.html"
        label: "İletişim"
        name: "iletisim"
        fields:
          - {label: "Başlık", name: "title", widget: "string"}
          - {label: "İçerik", name: "body", widget: "markdown"}
