backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "kategoriler"
    label: "Kategori ve Site Sayfaları"
    folder: "content/kategoriler"
    create: true
    fields:
      - {label: "Sayfa / Kategori Adı", name: "title", widget: "string"}
      - {label: "URL Yolu (Slug)", name: "slug", widget: "string"}
      - label: "Görsel ve İçerik Düzenleyici"
        name: "body"
        widget: "markdown"
        hint: "Buraya metinlerin yanı sıra HTML kodları, görsel linkleri ve videolarınızı ekleyebilirsiniz."
